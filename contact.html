<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <title>Document</title>
</head>
<body>
     <!-- Header -->
     <header>
        <nav class="navbar">
            <div class="logo">
                <img src="images/logo.webp" alt="Church Logo">
                <h2>Bostola</h2>
            </div>

                <ul class="nav-links">
                    <li><i class="fa-solid fa-house"></i><a href="index.html"></i> Home</a></li>
                    <li><i class="fa-solid fa-circle-info"></i><a href="about.html"> About Us</a></li>
                    <li><i class="fa-solid fa-hand"></i><a href="services.html"> Services</a></li>
                    <li><i class="fa-solid fa-face-smile"></i><a href="events.html"> Events</a></li>
                    <li><i class="fa-solid fa-image"></i><a href="gallery.html"> Gallery</a></li>
                    <li><i class="fa-regular fa-address-book"></i><a href="contact.html"> Contact</a></li>
                  
                </ul>

                <div class="menu-toggle">

                </div>
        </nav>
     </header>

     <section>

        <!--message on the left-->
        <div class="div-message-left">

            <h1>Get in Touch</h1>
            <p>I'd like to hear from you</p>
            <p>If you have any inquiries or just want to say hi, you can use this contact form</p>

        </div>

        <!--form on the right-->
        <div class="form-right">
            <form action="">
                <div class="container1">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" placeholder="Enter firstname" required>
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Enter lastname" required>
                </div>

                <div class="container2">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter email" required>
                    <label for="message">Message</label>
                    <textarea name="message" id="message" title="message" placeholder="Enter text..." required></textarea>
                </div>

                <label for="checkbox">Remember me</label>
                <input type="checkbox" id="checkbox" name="checkbox">
            </form>

        </div>

     </section>


</body>
</html>
